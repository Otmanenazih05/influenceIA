# ─────────────────────────────────────────────────────────────────────────────
# Nginx configuration for InfluenceIA Laravel API
# Designed for a single-container Docker setup on Render.com
# php-fpm is reached via TCP 127.0.0.1:9000 (default in official php:8.3-fpm image)
# ─────────────────────────────────────────────────────────────────────────────

user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    server {
        listen 80;
        server_name _;

        root /var/www/html/public;
        index index.php;

        # ── Laravel routing ───────────────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # ── PHP-FPM passthrough (TCP socket — standard in official php:8.3-fpm image)
        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_hide_header X-Powered-By;
            # Increase timeouts for slow cold-start requests
            fastcgi_read_timeout 300;
        }

        # ── Security: deny hidden files ────────────────────────────────────────
        location ~ /\. {
            deny all;
        }

        # ── Security: deny direct access to .env ──────────────────────────────
        location = /.env {
            deny all;
            return 404;
        }
    }
}
